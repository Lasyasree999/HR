<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Upload — HireGenius AI</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/components.css"><link rel="stylesheet" href="/css/animations.css">
</head><body>
<div class="app-layout"><div class="main-content"><div class="page-content page-enter">
    <h2 class="mb-6">Resume Upload</h2>
    <div class="card mb-6">
        <div class="form-group">
            <label class="form-label">Associate with Job (Optional)</label>
            <select class="form-control" id="jobSelect" style="max-width:400px;"><option value="">Loading jobs...</option></select>
        </div>
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon"><i class="bi bi-cloud-arrow-up-fill"></i></div>
            <div class="upload-text"><strong>Drag & drop resumes here</strong> or click to browse</div>
            <div class="upload-hint">Supports PDF, DOCX • Multiple files allowed • Bulk upload supported</div>
            <input type="file" id="fileInput" multiple accept=".pdf,.docx" style="display:none;">
        </div>
        <div class="hidden mt-4" id="progressContainer">
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        </div>
    </div>
    <div id="uploadResults"></div>
</div></div></div>
<script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/app.js"></script><script src="/js/resumes.js"></script>
</body></html>
