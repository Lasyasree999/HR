<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HireGenius AI Dashboard — Recruitment analytics, KPIs, and AI insights at a glance.">
    <title>Dashboard — HireGenius AI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/animations.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <div class="main-content">
            <div class="page-content page-enter">
                <div class="dashboard-header">
                    <h1>Welcome back! 👋</h1>
                    <p class="welcome-text">Here's your recruitment intelligence overview</p>
                </div>

                <!-- KPI Cards -->
                <div class="kpi-grid" id="kpiGrid">
                    <div class="kpi-card"><div class="skeleton skeleton-card"></div></div>
                    <div class="kpi-card"><div class="skeleton skeleton-card"></div></div>
                    <div class="kpi-card"><div class="skeleton skeleton-card"></div></div>
                    <div class="kpi-card"><div class="skeleton skeleton-card"></div></div>
                    <div class="kpi-card"><div class="skeleton skeleton-card"></div></div>
                </div>

                <!-- Charts Row -->
                <div class="dashboard-grid">
                    <div class="chart-card animate-fade-in-up stagger-3">
                        <div class="chart-title">Hiring Funnel</div>
                        <div class="chart-container">
                            <canvas id="funnelChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card animate-fade-in-up stagger-4">
                        <div class="chart-title">Top Skills</div>
                        <div class="chart-container">
                            <canvas id="skillsChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Activity + Insights -->
                <div class="dashboard-grid-equal">
                    <div class="card animate-fade-in-up stagger-5">
                        <div class="card-header"><h4>Recent Activity</h4></div>
                        <div class="card-body" id="activityList">
                            <div class="skeleton skeleton-text"></div>
                            <div class="skeleton skeleton-text"></div>
                            <div class="skeleton skeleton-text"></div>
                        </div>
                    </div>
                    <div class="card animate-fade-in-up stagger-6">
                        <div class="card-header"><h4><i class="bi bi-stars" style="color:var(--color-accent);margin-right:8px;"></i>AI Insights</h4></div>
                        <div class="card-body" id="insightsList">
                            <div class="insight-item">
                                <i class="bi bi-lightbulb-fill"></i>
                                <span>Upload resumes and create jobs to get AI-powered recruitment insights.</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
