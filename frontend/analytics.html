<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — HireGenius AI</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/components.css"><link rel="stylesheet" href="/css/animations.css"><link rel="stylesheet" href="/css/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head><body>
<div class="app-layout"><div class="main-content"><div class="page-content page-enter">
    <h2 class="mb-6">Recruitment Analytics</h2>
    <div class="dashboard-grid mb-6">
        <div class="chart-card animate-fade-in-up"><div class="chart-title">Hiring Funnel</div><div class="chart-container"><canvas id="funnelAnalytics"></canvas></div></div>
        <div class="chart-card animate-fade-in-up stagger-2"><div class="chart-title">Top Skills</div><div class="chart-container"><canvas id="skillsAnalytics"></canvas></div></div>
    </div>
    <div class="dashboard-grid-equal mb-6">
        <div class="chart-card animate-fade-in-up stagger-3"><div class="chart-title">Hiring Trends</div><div class="chart-container"><canvas id="trendsChart"></canvas></div></div>
        <div class="card animate-fade-in-up stagger-4"><div class="card-header"><h4>Department Statistics</h4></div><div class="card-body" id="departmentStats"></div></div>
    </div>
    <div class="card animate-fade-in-up stagger-5"><div class="card-header"><h4><i class="bi bi-stars" style="color:var(--color-accent);margin-right:8px;"></i>AI Insights</h4></div>
        <div class="card-body" id="aiInsights"><div class="skeleton skeleton-text"></div></div></div>
</div></div></div>
<script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/app.js"></script><script src="/js/analytics.js"></script>
</body></html>
