<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Copilot — HireGenius AI</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/components.css"><link rel="stylesheet" href="/css/animations.css">
</head><body>
<div class="app-layout"><div class="main-content"><div class="page-content page-enter" style="height:calc(100vh - var(--topbar-height));padding-bottom:0;">
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-suggestions" id="chatSuggestions">
            <button class="suggestion-chip">Show top Python candidates</button>
            <button class="suggestion-chip">Who is best suited for AI Engineer role?</button>
            <button class="suggestion-chip">What is the referral policy?</button>
            <button class="suggestion-chip">Which candidates have AWS certifications?</button>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Ask about candidates, jobs, policies...">
            <button class="btn btn-primary btn-ripple" id="sendBtn"><i class="bi bi-send-fill"></i></button>
        </div>
    </div>
</div></div></div>
<script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/app.js"></script><script src="/js/chatbot.js"></script>
</body></html>
