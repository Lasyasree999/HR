<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — HireGenius AI</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/components.css"><link rel="stylesheet" href="/css/animations.css">
</head><body>
<div class="app-layout"><div class="main-content"><div class="page-content page-enter">
    <h2 class="mb-6">Settings</h2>
    <div class="grid-2" style="gap:var(--space-6);">
        <div class="card">
            <h4 class="mb-4"><i class="bi bi-person-circle" style="color:var(--color-secondary);margin-right:8px;"></i>Profile</h4>
            <div class="mb-3"><span class="text-sm text-muted">Username:</span> <strong id="settingsUsername"></strong></div>
            <div class="mb-3"><span class="text-sm text-muted">Email:</span> <strong id="settingsEmail"></strong></div>
            <div class="mb-3"><span class="text-sm text-muted">Full Name:</span> <strong id="settingsName"></strong></div>
            <div class="mb-3"><span class="text-sm text-muted">Role:</span> <strong id="settingsRole"></strong></div>
        </div>
        <div class="card">
            <h4 class="mb-4"><i class="bi bi-gear" style="color:var(--color-secondary);margin-right:8px;"></i>System Info</h4>
            <div class="mb-3"><span class="text-sm text-muted">App:</span> <strong>HireGenius AI v1.0.0</strong></div>
            <div class="mb-3"><span class="text-sm text-muted">AI Model:</span> <strong>Llama 3.3 70B (Groq)</strong></div>
            <div class="mb-3"><span class="text-sm text-muted">Embeddings:</span> <strong>all-MiniLM-L6-v2</strong></div>
            <div class="mb-3"><span class="text-sm text-muted">Vector Store:</span> <strong>FAISS</strong></div>
            <div class="mb-3"><span class="text-sm text-muted">RAG Engine:</span> <strong>LlamaIndex</strong></div>
        </div>
    </div>

    <!-- Admin Section -->
    <div class="hidden mt-6" id="adminSection">
        <div class="flex items-center justify-between mb-4">
            <h3>User Management</h3>
            <button class="btn btn-primary btn-ripple" onclick="openAddUserModal()"><i class="bi bi-person-plus"></i> Add User</button>
        </div>
        <div id="usersList"><div class="skeleton skeleton-card" style="height:200px;"></div></div>
    </div>
</div></div></div>

<!-- Add User Modal -->
<div class="modal-overlay" id="addUserModal"><div class="modal">
    <div class="modal-header"><h3>Add New User</h3><button class="btn-ghost" onclick="closeAddUserModal()"><i class="bi bi-x-lg"></i></button></div>
    <div class="modal-body"><form onsubmit="addUser(event)">
        <div class="form-group"><label class="form-label">Username</label><input class="form-control" id="newUsername" required></div>
        <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" id="newEmail" required></div>
        <div class="form-group"><label class="form-label">Full Name</label><input class="form-control" id="newFullName" required></div>
        <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-control" id="newPassword" required minlength="6"></div>
        <div class="form-group"><label class="form-label">Role</label><select class="form-control" id="newRole"><option value="hr_manager">HR Manager</option><option value="admin">Admin</option></select></div>
        <div class="modal-footer" style="padding:var(--space-4) 0 0;border:none;">
            <button type="button" class="btn btn-secondary" onclick="closeAddUserModal()">Cancel</button>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Create User</button>
        </div>
    </form></div>
</div></div>
<script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/app.js"></script><script src="/js/settings.js"></script>
</body></html>
