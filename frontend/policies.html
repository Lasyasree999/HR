<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Policy Assistant — HireGenius AI</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/components.css"><link rel="stylesheet" href="/css/animations.css">
</head><body>
<div class="app-layout"><div class="main-content"><div class="page-content page-enter">
    <h2 class="mb-6">Policy Assistant</h2>
    <div class="grid" style="grid-template-columns:1fr 1fr;gap:var(--space-6);">
        <div>
            <div class="card mb-6">
                <h4 class="mb-4">Upload Policy Document</h4>
                <form onsubmit="uploadPolicy(event)">
                    <div class="form-group"><label class="form-label">Policy Title</label><input class="form-control" id="policyTitle" required placeholder="e.g. Employee Referral Policy"></div>
                    <div class="form-group"><label class="form-label">Document</label><input type="file" class="form-control" id="policyFile" accept=".pdf,.docx,.txt" required></div>
                    <button type="submit" class="btn btn-primary btn-ripple"><i class="bi bi-upload"></i> Upload & Index</button>
                </form>
            </div>
            <div class="card">
                <h4 class="mb-4"><i class="bi bi-search" style="color:var(--color-accent);margin-right:8px;"></i>Ask a Policy Question</h4>
                <form onsubmit="queryPolicy(event)">
                    <div class="form-group"><input class="form-control" id="policyQuestion" placeholder="e.g. What is the referral bonus policy?" required></div>
                    <button type="submit" class="btn btn-primary btn-ripple"><i class="bi bi-stars"></i> Ask AI</button>
                </form>
                <div id="policyAnswer" class="mt-4"></div>
            </div>
        </div>
        <div>
            <h4 class="mb-4">Uploaded Policies</h4>
            <div id="policiesList"><div class="skeleton skeleton-card" style="height:200px;"></div></div>
        </div>
    </div>
</div></div></div>
<script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/app.js"></script><script src="/js/policies.js"></script>
</body></html>
